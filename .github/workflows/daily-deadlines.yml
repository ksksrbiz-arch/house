name: Daily Deadline Watcher

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:

permissions: {}

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deadline-watcher worker
        run: |
          curl -s -X POST \
            "${{ secrets.WORKER_URL }}/api/deadline-watcher" \
            -H "Content-Type: application/json" \
            --fail-with-body

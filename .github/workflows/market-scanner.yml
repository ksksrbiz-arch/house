name: Daily Market Scanner

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC daily
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market-scan worker
        run: |
          curl -s -X POST \
            "${{ secrets.WORKER_URL }}/api/market-scan" \
            -H "Content-Type: application/json" \
            --fail-with-body

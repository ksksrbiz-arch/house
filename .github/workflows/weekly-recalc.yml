name: Weekly Recalc

on:
  schedule:
    - cron: '0 13 * * 0'   # 13:00 UTC Sunday
  workflow_dispatch:

permissions: {}

jobs:
  recalc:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger financial-recalc worker
        run: |
          curl -s -X POST \
            "${{ secrets.WORKER_URL }}/api/financial-recalc" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail-with-body
